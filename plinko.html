<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plinko Casino</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
        radial-gradient(circle at top,#220033,#050008 70%);
    color:#fff;
    min-height:100vh;
    overflow:hidden;
}

/* ================= HEADER ================= */

.topbar{
    height:70px;
    background:#120018;
    border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    box-shadow:0 0 30px rgba(170,0,255,.2);
}

.logo{
    font-size:22px;
    font-weight:800;
    color:#fff;
}

.balance-box{
    background:#1d0a2c;
    border:1px solid rgba(255,255,255,.08);
    padding:10px 16px;
    border-radius:14px;
    font-weight:700;
    color:#8dffb0;
    box-shadow:0 0 15px rgba(0,255,140,.08);
}

/* ================= MAIN ================= */

main{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.casino-frame{
    width:100%;
    max-width:460px;
    background:
        linear-gradient(180deg,#1b0828,#120018);
    border-radius:26px;
    border:1px solid rgba(255,255,255,.08);
    padding:16px;
    box-shadow:
        0 0 40px rgba(170,0,255,.18),
        inset 0 0 30px rgba(255,255,255,.03);
}

.inner-guide{
    background:#0d0613;
    border-radius:20px;
    padding:14px;
    border:1px solid rgba(255,255,255,.05);
    position:relative;
}

/* ================= CANVAS ================= */

canvas{
    width:100%;
    height:auto;
    background:
        radial-gradient(circle at top,#210035,#0a0011);
    border-radius:20px;
    display:block;
    border:1px solid rgba(255,255,255,.05);
}

/* ================= MULTIPLIERS ================= */

.multi-bar{
    display:flex;
    margin-top:12px;
    gap:6px;
}

.multi{
    flex:1;
    text-align:center;
    padding:8px 0;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    color:#fff;
    box-shadow:0 0 15px rgba(255,255,255,.08);
}

/* ================= CONTROLS ================= */

.game-footer{
    position:fixed;
    bottom:85px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:460px;
    padding:0 15px;
}

.control-wrap{
    background:#120018;
    border-radius:22px;
    padding:14px;
    border:1px solid rgba(255,255,255,.07);
    display:flex;
    gap:12px;
    align-items:center;
    box-shadow:0 0 25px rgba(170,0,255,.15);
}

.bet-box{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#0a0011;
    border-radius:14px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.06);
}

.bet-box button{
    width:48px;
    height:48px;
    border:none;
    background:#1f0b2f;
    color:#fff;
    font-size:22px;
    cursor:pointer;
}

.bet-value{
    flex:1;
    text-align:center;
    font-size:18px;
    font-weight:700;
}

.btn-drop{
    height:48px;
    padding:0 22px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#ff00c8,#8e00ff);
    color:#fff;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,0,200,.35);
}

.auto-btn{
    height:48px;
    padding:0 16px;
    border:none;
    border-radius:14px;
    background:#241030;
    color:#fff;
    font-weight:700;
    cursor:pointer;
}

.auto-btn.active{
    background:#00d26a;
    color:#000;
}

/* ================= BOTTOM NAV ================= */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;
    background:#120018;
    border-top:1px solid rgba(255,255,255,.08);
    display:flex;
    justify-content:space-around;
    align-items:center;
    font-size:14px;
    font-weight:700;
}

.bottom-nav div{
    opacity:.8;
}

.win-popup{
    position:absolute;
    color:#ffd700;
    font-weight:800;
    animation:floatUp 1s ease forwards;
    pointer-events:none;
    text-shadow:0 0 15px gold;
}

@keyframes floatUp{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-60px);
    }
}

@media(max-width:500px){

    .game-footer{
        bottom:78px;
    }

    .control-wrap{
        gap:8px;
        padding:10px;
    }

    .btn-drop{
        padding:0 18px;
    }

}
</style>
</head>

<body>

<!-- ================= HEADER ================= -->

<header class="topbar">

    <div class="logo">PLINKO</div>

    <div class="balance-box">
        ₦ <span id="balanceText">0.00</span>
    </div>

</header>

<!-- ================= MAIN ================= -->

<main>

<div class="casino-frame">

<div class="inner-guide">

<canvas id="gameCanvas" width="420" height="620"></canvas>

<div class="multi-bar">

<div class="multi" style="background:#ff003c;">3x</div>
<div class="multi" style="background:#ff5e00;">2x</div>
<div class="multi" style="background:#ff9d00;">1.5x</div>
<div class="multi" style="background:#ffc400;">1.1x</div>
<div class="multi" style="background:#00d26a;">0.5x</div>
<div class="multi" style="background:#ffc400;">1.1x</div>
<div class="multi" style="background:#ff9d00;">1.5x</div>
<div class="multi" style="background:#ff5e00;">2x</div>
<div class="multi" style="background:#ff003c;">3x</div>

</div>

</div>
</div>
</main>

<!-- ================= CONTROLS ================= -->

<div class="game-footer">

<div class="control-wrap">

<div class="bet-box">

<button onclick="adjBet(-10)">−</button>

<div class="bet-value" id="betText">50</div>

<button onclick="adjBet(10)">+</button>

</div>

<button class="auto-btn" id="autoBtn" onclick="toggleAuto()">
AUTO
</button>

<button class="btn-drop" onclick="dropBall()">
DROP
</button>

</div>
</div>

<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav">
<div>🏠 Home</div>
<div>🎰 Casino</div>
<div>⚽ Sports</div>
<div>💬 Chat</div>
</div>

<!-- ================= FIREBASE ================= -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="js/config.js"></script>

<script>

/* ================= FIREBASE ================= */

const db = window.db;
const auth = window.auth;

let currentUser = null;

/* ================= CANVAS ================= */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

/* ================= GAME ================= */

let balance = 100;
let bet = 50;
let isPlaying = false;
let isAuto = false;

const ROWS = 10;
const COLS = 9;

const multipliers = [3,2,1.5,1.1,0.5,1.1,1.5,2,3];

const pegs = [];

/* ================= USER ================= */

auth.onAuthStateChanged(async(user)=>{

    if(!user){
        alert("Please login first");
        return;
    }

    currentUser = user;

    const doc = await db.collection("users").doc(user.uid).get();

    if(doc.exists){

        balance = doc.data().balance || 100;

    }else{

        await db.collection("users").doc(user.uid).set({
            balance:100
        });

    }

    updateUI();

});

/* ================= CREATE PEGS ================= */

function createPegs(){

    pegs.length = 0;

    const stepX = canvas.width / (COLS + 1);
    const stepY = (canvas.height * .72) / ROWS;

    for(let r=0;r<ROWS;r++){

        const even = r % 2 === 0;

        const offset = even ? stepX : stepX * 1.5;

        const count = even ? COLS : COLS - 1;

        for(let c=0;c<count;c++){

            pegs.push({
                x: offset + c * stepX,
                y: (r + 1) * stepY + 20,
                active:0
            });

        }

    }

}

/* ================= DRAW ================= */

function drawBoard(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    pegs.forEach(p=>{

        ctx.beginPath();

        ctx.arc(p.x,p.y,4,0,Math.PI*2);

        ctx.fillStyle = p.active > 0 ? "#fff" : "#8a52b3";

        ctx.shadowBlur = p.active > 0 ? 20 : 0;
        ctx.shadowColor = "#fff";

        ctx.fill();

        ctx.shadowBlur = 0;

        if(p.active > 0) p.active--;

    });

}

/* ================= DROP ================= */

async function dropBall(){

    if(balance < bet || isPlaying) return;

    balance -= bet;

    updateUI();

    saveBalance();

    isPlaying = true;

    let ball = {

        x: canvas.width / 2,
        y: 10,
        vx:(Math.random()-.5)*2,
        vy:0,
        radius:7

    };

    function animate(){

        drawBoard();

        ball.vy += .22;

        ball.x += ball.vx;
        ball.y += ball.vy;

        if(ball.x < ball.radius || ball.x > canvas.width - ball.radius){

            ball.vx *= -.7;

        }

        pegs.forEach(p=>{

            const dx = ball.x - p.x;
            const dy = ball.y - p.y;

            if(Math.sqrt(dx*dx + dy*dy) < ball.radius + 4){

                p.active = 10;

                const angle = Math.atan2(dy,dx);

                ball.vx = Math.cos(angle) * 3;
                ball.vy = Math.sin(angle) * 3;

            }

        });

        ctx.beginPath();

        ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);

        ctx.fillStyle = "#ff00c8";

        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ff00c8";

        ctx.fill();

        ctx.shadowBlur = 0;

        if(ball.y < canvas.height - 50){

            requestAnimationFrame(animate);

        }else{

            resolveWin(ball.x);

        }

    }

    animate();

}

/* ================= WIN ================= */

function resolveWin(x){

    const section = canvas.width / multipliers.length;

    const idx = Math.floor(x / section);

    const multi = multipliers[
        Math.max(0,Math.min(idx,multipliers.length-1))
    ];

    const win = bet * multi;

    balance += win;

    updateUI();

    saveBalance();

    showWin(win);

    isPlaying = false;

    if(isAuto){

        setTimeout(dropBall,700);

    }

}

/* ================= SAVE BALANCE ================= */

async function saveBalance(){

    if(!currentUser) return;

    await db.collection("users")
    .doc(currentUser.uid)
    .update({
        balance:balance
    });

}

/* ================= WIN POPUP ================= */

function showWin(amount){

    const div = document.createElement('div');

    div.className = 'win-popup';

    div.innerText = "+" + amount.toFixed(2);

    div.style.left = '50%';
    div.style.top = '120px';

    document.body.appendChild(div);

    setTimeout(()=>{
        div.remove();
    },1000);

}

/* ================= BET ================= */

function adjBet(v){

    if(isPlaying) return;

    bet = Math.max(10,bet + v);

    updateUI();

}

/* ================= AUTO ================= */

function toggleAuto(){

    isAuto = !isAuto;

    document.getElementById('autoBtn')
    .classList.toggle('active',isAuto);

    if(isAuto && !isPlaying){

        dropBall();

    }

}

/* ================= UI ================= */

function updateUI(){

    document.getElementById('balanceText')
    .innerText = balance.toFixed(2);

    document.getElementById('betText')
    .innerText = bet;

}

/* ================= INIT ================= */

createPegs();

drawBoard();

</script>

</body>
</html>
